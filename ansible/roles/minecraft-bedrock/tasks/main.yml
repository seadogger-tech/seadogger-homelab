---
# ansible/roles/minecraft-bedrock/tasks/main.yml
# Lightweight bootstrap role — ArgoCD owns the actual deployment.
# This role runs once during cluster bootstrap (ansible/main.yml)
# to register the ArgoCD Application into the core baseline.

- name: Apply minecraft-bedrock ArgoCD Application
  kubernetes.core.k8s:
    state: present
    src: "{{ playbook_dir }}/../deployments/argocd-apps/minecraft-bedrock.yaml"
  tags:
    - minecraft
    - core-baseline

- name: Wait for minecraft-bedrock namespace to be active
  kubernetes.core.k8s_info:
    kind: Namespace
    name: minecraft-bedrock
  register: ns_result
  until: ns_result.resources | length > 0
  retries: 10
  delay: 10
  tags:
    - minecraft
    - core-baseline

- name: Print Xbox connection info
  debug:
    msg:
      - "Minecraft Bedrock server deploying..."
      - "Xbox connection IP : 192.168.1.247:19132"
      - "Pack manager UI    : https://minecraft.seadogger-homelab"
      - "Default credentials: admin / admin  <-- CHANGE IMMEDIATELY"
  tags:
    - minecraft
