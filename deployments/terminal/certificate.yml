apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: terminal-certificate
  namespace: terminal
spec:
  secretName: terminal-local-tls
  duration: 2160h
  renewBefore: 360h
  subject:
    organizations:
      - SeaDogger Homelab
  isCA: false
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
  dnsNames:
    - terminal.seadogger-homelab
  issuerRef:
    name: internal-local-issuer
    kind: ClusterIssuer
