ollama:
  enabled: false

pipelines:
  enabled: false

# Disable automatic model downloads on startup (causes hangs on Pi)
extraEnvVars:
  - name: ENABLE_RAG_WEB_SEARCH
    value: "False"
  - name: ENABLE_MODEL_FILTER
    value: "False"

persistence:
  enabled: true
  size: 250Gi
  storageClass: "ceph-block-data"
  accessMode: ReadWriteMany

# Service configuration
service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: false
