apiVersion: v1
kind: ConfigMap
metadata:
  name: minecraft-pack-sync-script
data:
  sync-packs.sh: |
    #!/bin/bash
    set -e

    # Source and destination paths
    NEXTCLOUD_MINECRAFT="/nextcloud/data/minecraft-packs"
    RESOURCE_PACKS="/data/resource_packs"
    BEHAVIOR_PACKS="/data/behavior_packs"
    PROCESSED_DIR="/nextcloud/data/minecraft-packs/.processed"

    echo "[$(date)] Starting pack sync..."

    # Create directories if they don't exist
    mkdir -p "$NEXTCLOUD_MINECRAFT/resource-packs"
    mkdir -p "$NEXTCLOUD_MINECRAFT/behavior-packs"
    mkdir -p "$PROCESSED_DIR"

    # Process resource packs
    if ls "$NEXTCLOUD_MINECRAFT/resource-packs"/*.mcpack 1> /dev/null 2>&1; then
        for mcpack in "$NEXTCLOUD_MINECRAFT/resource-packs"/*.mcpack; do
            filename=$(basename "$mcpack")
            pack_name="${filename%.mcpack}"

            echo "Processing resource pack: $filename"

            # Extract to resource_packs
            unzip -o "$mcpack" -d "$RESOURCE_PACKS/$pack_name"

            # Move to processed
            mv "$mcpack" "$PROCESSED_DIR/$filename"

            echo "  ✓ Extracted to $RESOURCE_PACKS/$pack_name"
        done
    fi

    # Process behavior packs
    if ls "$NEXTCLOUD_MINECRAFT/behavior-packs"/*.mcpack 1> /dev/null 2>&1; then
        for mcpack in "$NEXTCLOUD_MINECRAFT/behavior-packs"/*.mcpack; then
            filename=$(basename "$mcpack")
            pack_name="${filename%.mcpack}"

            echo "Processing behavior pack: $filename"

            # Extract to behavior_packs
            unzip -o "$mcpack" -d "$BEHAVIOR_PACKS/$pack_name"

            # Move to processed
            mv "$mcpack" "$PROCESSED_DIR/$filename"

            echo "  ✓ Extracted to $BEHAVIOR_PACKS/$pack_name"
        done
    fi

    echo "[$(date)] Pack sync complete!"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: minecraft-pack-sync
spec:
  schedule: "*/5 * * * *"  # Run every 5 minutes
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pack-sync
              image: busybox:latest
              command:
                - /bin/sh
                - /scripts/sync-packs.sh
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                - name: nextcloud-data
                  mountPath: /nextcloud
                - name: minecraft-data
                  mountPath: /data
          volumes:
            - name: scripts
              configMap:
                name: minecraft-pack-sync-script
                defaultMode: 0755
            - name: nextcloud-data
              persistentVolumeClaim:
                claimName: nextcloud-nextcloud
            - name: minecraft-data
              persistentVolumeClaim:
                claimName: minecraft-bedrock-data
