        if not success:
            return jsonify({'error': result}), 500

        return jsonify({'message': result}), 200

    @app.route('/api/worlds/<world_name>/packs', methods=['GET'])
    def get_world_packs_endpoint(world_name):
        """Get all packs for a specific world"""
        return jsonify(get_world_packs(world_name)), 200

    @app.route('/api/worlds/<world_name>/packs/<pack_type>/<pack_id>/toggle', methods=['PUT'])
    def toggle_world_pack(world_name, pack_type, pack_id):
        """Toggle pack for specific world"""
        if pack_type not in ['resource', 'behavior']:
            return jsonify({'error': 'Invalid pack type'}), 400

        success, result = toggle_pack_for_world(world_name, pack_id, pack_type)
        if not success:
            return jsonify({'error': result}), 500

        # Restart world if running
        if check_world_deployment_running(world_name):
            sanitized = sanitize_name(world_name)
            deployment_name = f'minecraft-bedrock-{sanitized}'
            subprocess.run(
                ['kubectl', 'rollout', 'restart', f'deployment/{deployment_name}', '-n', NAMESPACE],
                capture_output=True
            )
            result += '. World restarting...'

        return jsonify({'message': result}), 200

    @app.route('/api/packs/<pack_type>/<pack_folder>/usage', methods=['GET'])
    def get_pack_usage(pack_type, pack_folder):
        """Get list of worlds using this pack"""
        # Get pack ID from folder
        packs_dir = RESOURCE_PACKS_DIR if pack_type == 'resource' else BEHAVIOR_PACKS_DIR
        folder_path = os.path.join(packs_dir, pack_folder)
        manifest_path = os.path.join(folder_path, 'manifest.json')

        if not os.path.exists(manifest_path):
            return jsonify({'error': 'Pack not found'}), 404

        try:
            with open(manifest_path, 'r') as mf:
                manifest = json.load(mf)
                pack_id = manifest.get('header', {}).get('uuid')
                if not pack_id:
                    return jsonify({'error': 'No UUID in manifest'}), 400

                worlds = get_pack_usage_across_worlds(pack_id)
                return jsonify({'worlds': worlds}), 200
        except Exception as e:
            return jsonify({'error': str(e)}), 500

    # ==================== PACK MANAGEMENT API ENDPOINTS ====================

    @app.route('/api/upload', methods=['POST'])
    def upload():
        if 'file' not in request.files:
            return jsonify({'error': 'No file'}), 400
        file = request.files['file']
        if not file.filename or not file.filename.endswith('.mcpack'):
            return jsonify({'error': 'Invalid file'}), 400
        try:
            filename = secure_filename(file.filename)
            upload_path = os.path.join(UPLOAD_FOLDER, filename)
            file.save(upload_path)
            pack_type = request.form.get('packType', 'resource')
            destination = RESOURCE_PACKS_DIR if pack_type == 'resource' else BEHAVIOR_PACKS_DIR
            success, result = extract_mcpack(upload_path, destination, pack_type)
            os.remove(upload_path)
            if not success:
                return jsonify({'error': f'Extraction failed: {result}'}), 500
            restart_success, restart_msg = restart_server()
            message = f'Pack "{result}" installed and activated! ' + ('Server restarting...' if restart_success else f'Restart failed: {restart_msg}')
            return jsonify({'message': message}), 200
        except Exception as e:
            return jsonify({'error': str(e)}), 500

    @app.route('/api/extract', methods=['POST'])
    def extract():
        extracted = []
        for pack_type, dir_path in [('resource', RESOURCE_PACKS_DIR), ('behavior', BEHAVIOR_PACKS_DIR)]:
            for filename in os.listdir(dir_path):
                if filename.endswith('.mcpack'):
                    mcpack_path = os.path.join(dir_path, filename)
                    success, result = extract_mcpack(mcpack_path, dir_path, pack_type)
                    if success:
                        os.remove(mcpack_path)
                        extracted.append(result)
        return jsonify({'message': f'Extracted {len(extracted)} pack(s)' if extracted else 'No packs found'}), 200

    @app.route('/api/packs', methods=['GET'])
    def list_packs():
        return jsonify(get_all_packs()), 200

    @app.route('/api/packs/<pack_type>/<pack_id>', methods=['DELETE'])
    def remove_pack(pack_type, pack_id):
        if pack_type not in ['resource', 'behavior']:
            return jsonify({'error': 'Invalid pack type'}), 400
        success, error = remove_pack_from_world(pack_id, pack_type)
        if not success:
            return jsonify({'error': error}), 500
        return jsonify({'message': f'Pack disabled. Restart server to apply changes.'}), 200

    @app.route('/api/packs/<pack_type>/<pack_id>/toggle', methods=['PUT'])
    def toggle_pack(pack_type, pack_id):
        if pack_type not in ['resource', 'behavior']:
            return jsonify({'error': 'Invalid pack type'}), 400

        # Get pack info from folder
        packs_dir = RESOURCE_PACKS_DIR if pack_type == 'resource' else BEHAVIOR_PACKS_DIR
        pack_info = None
        for pack_dir in glob.glob(os.path.join(packs_dir, '*')):
            if os.path.isdir(pack_dir):
                manifest_path = os.path.join(pack_dir, 'manifest.json')
                if os.path.exists(manifest_path):
                    try:
                        with open(manifest_path, 'r') as mf:
                            manifest = json.load(mf)
                            if manifest.get('header', {}).get('uuid') == pack_id:
                                pack_info = {
                                    'pack_id': pack_id,
                                    'version': manifest.get('header', {}).get('version', [1, 0, 0]),
                                    'name': manifest.get('header', {}).get('name')
                                }
                                break
                    except:
                        pass

        if not pack_info:
            return jsonify({'error': 'Pack not found'}), 404

        # Check if active
        json_file = RESOURCE_PACKS_JSON if pack_type == 'resource' else BEHAVIOR_PACKS_JSON
        is_active = False
        if os.path.exists(json_file):
            with open(json_file, 'r') as f:
                packs = json.load(f)
                is_active = any(p.get('pack_id') == pack_id for p in packs)

        if is_active:
            # Disable
            success, error = remove_pack_from_world(pack_id, pack_type)
            action = 'disabled'
        else:
            # Enable
            success, error = update_world_packs_json(pack_info, pack_type)
            action = 'enabled'

        if not success:
            return jsonify({'error': error}), 500

        return jsonify({'message': f'Pack {action}. Restart server to apply.'}), 200

    @app.route('/api/packs/<pack_type>/<pack_folder>/delete', methods=['DELETE'])
    def delete_pack(pack_type, pack_folder):
        if pack_type not in ['resource', 'behavior']:
            return jsonify({'error': 'Invalid pack type'}), 400

        # Find pack ID from folder
        packs_dir = RESOURCE_PACKS_DIR if pack_type == 'resource' else BEHAVIOR_PACKS_DIR
        folder_path = os.path.join(packs_dir, pack_folder)
        manifest_path = os.path.join(folder_path, 'manifest.json')

        pack_id = None
        if os.path.exists(manifest_path):
            try:
                with open(manifest_path, 'r') as mf:
                    manifest = json.load(mf)
                    pack_id = manifest.get('header', {}).get('uuid')
            except:
                pass

        # Check if pack is used in any worlds
        if pack_id:
            using_worlds = get_pack_usage_across_worlds(pack_id)
            if using_worlds:
                return jsonify({
                    'error': f'Pack is used in {len(using_worlds)} world(s): {", ".join(using_worlds)}. Disable it in all worlds first.'
                }), 400

            # Remove from legacy world JSON if present
            remove_pack_from_world(pack_id, pack_type)

        # Delete folder
        success, error = delete_pack_folder(pack_folder, pack_type)
        if not success:
            return jsonify({'error': error}), 500

        return jsonify({'message': 'Pack deleted permanently'}), 200

    @app.route('/api/restart', methods=['POST'])
    def restart():
        success, message = restart_server()
        return jsonify({'message': message}), 200 if success else 500

    @app.route('/api/status', methods=['GET'])
    def status():
        return jsonify(get_server_status()), 200

    if __name__ == '__main__':
        app.run(host='0.0.0.0', port=8080, debug=False)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pack-manager-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pack-manager-ui
  template:
    metadata:
      labels:
        app: pack-manager-ui
    spec:
      serviceAccountName: pack-manager-ui
      containers:
        - name: ui
          image: python:3.11-slim
          workingDir: /app
          command:
            - /bin/sh
            - -c
            - |
              apt-get update && apt-get install -y kubectl && \
              pip install --no-cache-dir flask flask-cors pyyaml && \
              python app.py
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: app
              mountPath: /app
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: app
          configMap:
            name: pack-manager-ui-app
        - name: data
          persistentVolumeClaim:
            claimName: minecraft-bedrock-data
---
apiVersion: v1
kind: Service
metadata:
  name: pack-manager-ui
spec:
  selector:
    app: pack-manager-ui
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pack-manager-ui-https
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`minecraft-packs.seadogger-homelab`)
      kind: Rule
      services:
        - name: pack-manager-ui
          port: 80
  tls:
    secretName: minecraft-packs-local-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: minecraft-packs-certificate
spec:
  secretName: minecraft-packs-local-tls
  issuerRef:
    name: internal-local-issuer
    kind: ClusterIssuer
  dnsNames:
    - minecraft-packs.seadogger-homelab
