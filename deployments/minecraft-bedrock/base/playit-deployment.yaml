apiVersion: apps/v1
kind: Deployment
metadata:
  name: playit-agent
  labels:
    app: playit-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: playit-agent
  strategy:
    type: Recreate  # Single instance, persistent config
  template:
    metadata:
      labels:
        app: playit-agent
    spec:
      hostNetwork: true  # Required to access Minecraft server on host port 19132
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: playit
          image: ghcr.io/playit-cloud/playit-agent:v0.17.0  # Pinned to v0.17.0 (2026-01-14)
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: playit-secret
                  key: secret-key
          volumeMounts:
            - name: config
              mountPath: /root/.config/playit  # Default config path
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: playit-config
