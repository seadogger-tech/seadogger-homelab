apiVersion: apps/v1
kind: Deployment
metadata:
  name: minecraft-pack-manager
  labels:
    app: minecraft-pack-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minecraft-pack-manager
  template:
    metadata:
      labels:
        app: minecraft-pack-manager
    spec:
      containers:
        - name: pack-manager
          image: python:3.11-slim
          command:
            - /bin/sh
            - -c
            - |
              pip install --no-cache-dir flask flask-cors && \
              python /app/app.py
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: data
              mountPath: /data
            - name: app-script
              mountPath: /app
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minecraft-bedrock-data
        - name: app-script
          configMap:
            name: minecraft-pack-manager-ui
---
apiVersion: v1
kind: Service
metadata:
  name: minecraft-pack-manager
spec:
  selector:
    app: minecraft-pack-manager
  ports:
    - name: http
      port: 80
      targetPort: 5000
