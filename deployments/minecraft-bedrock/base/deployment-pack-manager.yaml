apiVersion: apps/v1
kind: Deployment
metadata:
  name: minecraft-pack-manager
  labels:
    app: minecraft-pack-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minecraft-pack-manager
  template:
    metadata:
      labels:
        app: minecraft-pack-manager
    spec:
      containers:
        - name: filebrowser
          image: filebrowser/filebrowser:latest
          ports:
            - containerPort: 80
          args:
            - --root=/data
            - --port=80
            - --database=/tmp/filebrowser.db
            - --log=stdout
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minecraft-bedrock-data
---
apiVersion: v1
kind: Service
metadata:
  name: minecraft-pack-manager
spec:
  selector:
    app: minecraft-pack-manager
  ports:
    - name: http
      port: 80
      targetPort: 80
