# HTTP: catch and redirect to HTTPS
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: openwebui
spec:
  redirectScheme:
    scheme: https
    permanent: true
    port: "443"

---
# HTTP: catch and redirect to HTTPS
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openwebui-http
  namespace: openwebui
spec:
  entryPoints: ["web"]
  routes:
    - match: Host(`openwebui.seadogger-homelab`)
      kind: Rule
      middlewares:
        - name: redirect-https
      services:
        - name: openwebui-open-webui
          port: 8080

---
# HTTPS: real route with TLS
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openwebui-https
  namespace: openwebui
spec:
  entryPoints: ["websecure"]
  routes:
    - match: Host(`openwebui.seadogger-homelab`)
      kind: Rule
      services:
        - name: openwebui-open-webui
          port: 8080
  tls:
    secretName: openwebui-local-tls
